<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tenants — BMP Central</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/admin.css"/>
</head>
<body>
<div class="admin-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-wrap">
    <header class="topbar" id="topbar"></header>
    <main class="main-content">

      <div class="page-header">
        <div>
          <h2>Tenants</h2>
          <div class="page-sub" id="tenantCount">Loading…</div>
        </div>
        <button class="btn btn-primary" onclick="openModal('addModal')">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add Tenant
        </button>
      </div>

      <div class="filter-bar">
        <div class="filter-search">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" placeholder="Search tenants…" id="searchInput" oninput="filterTenants()"/>
        </div>
        <div class="filter-tabs">
          <button class="filter-tab active" data-filter="all" onclick="setFilter('all',this)">All</button>
          <button class="filter-tab" data-filter="active" onclick="setFilter('active',this)">Active</button>
          <button class="filter-tab" data-filter="late" onclick="setFilter('late',this)">Late</button>
          <button class="filter-tab" data-filter="notice" onclick="setFilter('notice',this)">Notice</button>
        </div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Tenant</th>
              <th>Unit</th>
              <th>Monthly Rent</th>
              <th>Lease End</th>
              <th>Status</th>
              <th>Contact</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="tenantTable">
            <tr class="loading-row"><td colspan="7">Loading…</td></tr>
          </tbody>
        </table>
      </div>

    </main>
  </div>
</div>

<!-- Add Tenant Modal -->
<div class="modal-backdrop" id="addModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Add Tenant</span>
      <button class="modal-close" onclick="closeModal('addModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group"><label class="form-label">Full Name *</label><input class="form-input" id="a-name" placeholder="James Rivera"/></div>
        <div class="form-group"><label class="form-label">Phone</label><input class="form-input" id="a-phone" placeholder="(602) 555-0000"/></div>
      </div>
      <div class="form-group"><label class="form-label">Email</label><input class="form-input" type="email" id="a-email" placeholder="tenant@email.com"/></div>
      <div class="form-group">
        <label class="form-label">Unit</label>
        <select class="form-select" id="a-unit"><option value="">Select unit…</option></select>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Monthly Rent ($)</label><input class="form-input" type="number" id="a-rent" placeholder="1500"/></div>
        <div class="form-group">
          <label class="form-label">Status</label>
          <select class="form-select" id="a-status">
            <option value="active">Active</option>
            <option value="late">Late</option>
            <option value="notice">Notice</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Lease Start</label><input class="form-input" type="date" id="a-start"/></div>
        <div class="form-group"><label class="form-label">Lease End</label><input class="form-input" type="date" id="a-end"/></div>
      </div>
      <div class="form-group"><label class="form-label">Notes</label><textarea class="form-textarea" id="a-notes" placeholder="Any notes…"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('addModal')">Cancel</button>
      <button class="btn btn-primary" id="addBtn" onclick="addTenant()">Add Tenant</button>
    </div>
  </div>
</div>

<!-- View/Edit Tenant Modal -->
<div class="modal-backdrop" id="viewModal">
  <div class="modal" style="max-width:580px;">
    <div class="modal-header">
      <span class="modal-title" id="viewModalTitle">Tenant Details</span>
      <button class="modal-close" onclick="closeModal('viewModal')">✕</button>
    </div>
    <div class="modal-body" id="viewModalBody"></div>
    <div class="modal-footer">
      <button class="btn btn-danger btn-sm" id="deleteBtn" onclick="deleteTenant()">Delete</button>
      <div style="flex:1"></div>
      <button class="btn btn-ghost" onclick="closeModal('viewModal')">Close</button>
      <button class="btn btn-primary" id="saveBtn" onclick="saveTenant()">Save Changes</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/layout.js"></script>
<script>
let currentUser = null
let allTenants = []
let currentFilter = 'all'
let editingTenantId = null
let units = []

async function init() {
  currentUser = await requireAuth()
  if (!currentUser) return
  await renderLayout('tenants', 'Tenants')
  await loadUnits()
  await loadTenants()
}

async function loadUnits() {
  const { data } = await db
    .from('units')
    .select('id, unit_number, properties(name)')
    .eq('properties.pm_id', currentUser.id)
    .order('unit_number')
  units = data || []
  const sel = document.getElementById('a-unit')
  sel.innerHTML = '<option value="">Select unit…</option>' +
    units.map(u => `<option value="${u.id}">${u.properties?.name} — ${u.unit_number}</option>`).join('')
}

async function loadTenants() {
  const { data } = await db
    .from('tenants')
    .select('*, units(unit_number, properties(name))')
    .eq('pm_id', currentUser.id)
    .order('name')
  allTenants = data || []
  document.getElementById('tenantCount').textContent = `${allTenants.length} total`
  renderTable()
}

function setFilter(f, btn) {
  currentFilter = f
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'))
  btn.classList.add('active')
  renderTable()
}

function filterTenants() { renderTable() }

function renderTable() {
  const q = document.getElementById('searchInput').value.toLowerCase()
  let rows = allTenants.filter(t => {
    if (currentFilter !== 'all' && t.status !== currentFilter) return false
    if (q && !t.name.toLowerCase().includes(q) && !t.email?.toLowerCase().includes(q)) return false
    return true
  })

  const tbody = document.getElementById('tenantTable')
  if (rows.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:40px;color:rgba(15,23,42,0.35);font-size:0.82rem;">No tenants found</td></tr>'
    return
  }
  tbody.innerHTML = rows.map(t => `
    <tr>
      <td>
        <div class="name-cell">
          <div class="avatar" style="background:${avatarColor(t.name)}">${initials(t.name)}</div>
          <div>
            <div class="fw-700">${t.name}</div>
            <div class="td-muted" style="font-size:0.72rem;">${t.email || '—'}</div>
          </div>
        </div>
      </td>
      <td>
        ${t.units ? `<span class="fw-700">${t.units.unit_number}</span><br><span class="td-muted" style="font-size:0.72rem;">${t.units.properties?.name || ''}</span>` : '<span class="td-muted">—</span>'}
      </td>
      <td class="fw-700">${fmt$(t.monthly_rent)}</td>
      <td class="td-muted">${fmtDate(t.lease_end)}</td>
      <td>${statusBadge(t.status)}</td>
      <td class="td-muted">${t.phone || '—'}</td>
      <td>
        <button class="btn btn-ghost btn-sm" onclick="openView('${t.id}')">View</button>
      </td>
    </tr>`).join('')
}

async function addTenant() {
  const name = document.getElementById('a-name').value.trim()
  if (!name) { toast('Name is required', 'error'); return }
  const btn = document.getElementById('addBtn')
  btnLoad(btn, true)
  const { error } = await db.from('tenants').insert({
    pm_id: currentUser.id,
    name,
    phone: document.getElementById('a-phone').value || null,
    email: document.getElementById('a-email').value || null,
    unit_id: document.getElementById('a-unit').value || null,
    monthly_rent: parseFloat(document.getElementById('a-rent').value) || 0,
    status: document.getElementById('a-status').value,
    lease_start: document.getElementById('a-start').value || null,
    lease_end: document.getElementById('a-end').value || null,
    notes: document.getElementById('a-notes').value || null,
  })
  btnLoad(btn, false)
  if (error) { toast(error.message, 'error'); return }
  toast('Tenant added')
  closeModal('addModal')
  document.getElementById('addModal').querySelectorAll('input,select,textarea').forEach(el => el.value = '')
  await loadTenants()
}

function openView(id) {
  const t = allTenants.find(x => x.id === id)
  if (!t) return
  editingTenantId = id
  document.getElementById('viewModalTitle').textContent = t.name
  document.getElementById('viewModalBody').innerHTML = `
    <div class="form-row">
      <div class="form-group"><label class="form-label">Full Name</label><input class="form-input" id="v-name" value="${t.name}"/></div>
      <div class="form-group"><label class="form-label">Phone</label><input class="form-input" id="v-phone" value="${t.phone || ''}"/></div>
    </div>
    <div class="form-group"><label class="form-label">Email</label><input class="form-input" id="v-email" value="${t.email || ''}"/></div>
    <div class="form-group">
      <label class="form-label">Unit</label>
      <select class="form-select" id="v-unit">
        <option value="">No unit</option>
        ${units.map(u => `<option value="${u.id}" ${u.id === t.unit_id ? 'selected' : ''}>${u.properties?.name} — ${u.unit_number}</option>`).join('')}
      </select>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Monthly Rent ($)</label><input class="form-input" type="number" id="v-rent" value="${t.monthly_rent || ''}"/></div>
      <div class="form-group">
        <label class="form-label">Status</label>
        <select class="form-select" id="v-status">
          ${['active','late','notice','past'].map(s => `<option value="${s}" ${t.status === s ? 'selected':''}>${s.charAt(0).toUpperCase()+s.slice(1)}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Lease Start</label><input class="form-input" type="date" id="v-start" value="${t.lease_start || ''}"/></div>
      <div class="form-group"><label class="form-label">Lease End</label><input class="form-input" type="date" id="v-end" value="${t.lease_end || ''}"/></div>
    </div>
    <div class="form-group"><label class="form-label">Notes</label><textarea class="form-textarea" id="v-notes">${t.notes || ''}</textarea></div>
  `
  openModal('viewModal')
}

async function saveTenant() {
  const btn = document.getElementById('saveBtn')
  btnLoad(btn, true)
  const { error } = await db.from('tenants').update({
    name: document.getElementById('v-name').value,
    phone: document.getElementById('v-phone').value || null,
    email: document.getElementById('v-email').value || null,
    unit_id: document.getElementById('v-unit').value || null,
    monthly_rent: parseFloat(document.getElementById('v-rent').value) || 0,
    status: document.getElementById('v-status').value,
    lease_start: document.getElementById('v-start').value || null,
    lease_end: document.getElementById('v-end').value || null,
    notes: document.getElementById('v-notes').value || null,
  }).eq('id', editingTenantId)
  btnLoad(btn, false)
  if (error) { toast(error.message, 'error'); return }
  toast('Saved')
  closeModal('viewModal')
  await loadTenants()
}

async function deleteTenant() {
  if (!confirm('Delete this tenant? This cannot be undone.')) return
  await db.from('tenants').delete().eq('id', editingTenantId)
  toast('Tenant deleted')
  closeModal('viewModal')
  await loadTenants()
}

function openModal(id) { document.getElementById(id).classList.add('open') }
function closeModal(id) { document.getElementById(id).classList.remove('open') }

document.querySelectorAll('.modal-backdrop').forEach(b => b.addEventListener('click', e => {
  if (e.target === b) b.classList.remove('open')
}))

init()
</script>
</body>
</html>
