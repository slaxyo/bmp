<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — BMP Central</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/admin.css"/>
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <span class="s-logo-mark" style="font-size:0.75rem;padding:6px 9px;">BMP</span>
      <span style="font-size:1rem;font-weight:700;color:#0f172a;">Central</span>
    </div>

    <!-- SIGN IN -->
    <div id="viewSignin">
      <div class="login-heading">Welcome back</div>
      <div class="login-sub">Sign in to your PM dashboard</div>
      <div class="login-error" id="signinError"></div>
      <form id="signinForm">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input class="form-input" type="email" id="signinEmail" placeholder="you@example.com" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input class="form-input" type="password" id="signinPassword" placeholder="••••••••" required/>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;height:44px;margin-top:4px;" id="signinBtn">Sign in</button>
      </form>
      <div class="login-toggle">Don't have an account? <a href="#" onclick="showView('signup')">Create one</a></div>
    </div>

    <!-- SIGN UP -->
    <div id="viewSignup" style="display:none">
      <div class="login-heading">Create account</div>
      <div class="login-sub">Set up your BMP Central admin</div>
      <div class="login-error" id="signupError"></div>
      <form id="signupForm">
        <div class="form-group">
          <label class="form-label">Your name</label>
          <input class="form-input" type="text" id="signupName" placeholder="Sarah Johnson" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input class="form-input" type="email" id="signupEmail" placeholder="you@example.com" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input class="form-input" type="password" id="signupPassword" placeholder="Min 6 characters" required/>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;height:44px;margin-top:4px;" id="signupBtn">Create account</button>
      </form>
      <div class="login-toggle">Already have an account? <a href="#" onclick="showView('signin')">Sign in</a></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script>
  db.auth.getSession().then(({ data: { session } }) => {
    if (session) window.location.href = 'dashboard.html'
  })

  function showView(v) {
    document.getElementById('viewSignin').style.display = v === 'signin' ? '' : 'none'
    document.getElementById('viewSignup').style.display = v === 'signup' ? '' : 'none'
  }

  document.getElementById('signinForm').addEventListener('submit', async e => {
    e.preventDefault()
    const btn = document.getElementById('signinBtn')
    const err = document.getElementById('signinError')
    btn.textContent = 'Signing in…'; btn.disabled = true; err.style.display = 'none'
    const { error } = await db.auth.signInWithPassword({
      email: document.getElementById('signinEmail').value,
      password: document.getElementById('signinPassword').value,
    })
    if (error) {
      err.textContent = error.message; err.style.display = 'block'
      btn.textContent = 'Sign in'; btn.disabled = false
    } else {
      window.location.href = 'dashboard.html'
    }
  })

  document.getElementById('signupForm').addEventListener('submit', async e => {
    e.preventDefault()
    const btn = document.getElementById('signupBtn')
    const err = document.getElementById('signupError')
    btn.textContent = 'Creating…'; btn.disabled = true; err.style.display = 'none'
    const name = document.getElementById('signupName').value
    const { error } = await db.auth.signUp({
      email: document.getElementById('signupEmail').value,
      password: document.getElementById('signupPassword').value,
      options: { data: { name } }
    })
    if (error) {
      err.textContent = error.message; err.style.display = 'block'
      btn.textContent = 'Create account'; btn.disabled = false
    } else {
      window.location.href = 'dashboard.html'
    }
  })
</script>
</body>
</html>
