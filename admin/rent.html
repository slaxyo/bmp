<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rent — BMP Central</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/admin.css"/>
</head>
<body>
<div class="admin-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-wrap">
    <header class="topbar" id="topbar"></header>
    <main class="main-content">

      <!-- Month nav -->
      <div class="page-header">
        <div>
          <h2>Rent Tracker</h2>
          <div class="page-sub">Track and log payments for your tenants</div>
        </div>
        <div style="display:flex;align-items:center;gap:10px;">
          <button class="btn btn-ghost btn-sm" onclick="changeMonth(-1)">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
          <span style="font-size:0.9rem;font-weight:700;color:#0f172a;min-width:130px;text-align:center;" id="monthLabel"></span>
          <button class="btn btn-ghost btn-sm" onclick="changeMonth(1)">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
          <button class="btn btn-primary btn-sm" onclick="generateMonth()">Generate Month</button>
        </div>
      </div>

      <!-- Summary cards -->
      <div class="stats-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:24px;" id="summaryCards">
        <div class="stat-card">
          <div class="stat-icon stat-icon--blue"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></div>
          <div class="stat-n" id="s-expected">—</div><div class="stat-l">Expected</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon stat-icon--green"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></div>
          <div class="stat-n" id="s-collected">—</div><div class="stat-l">Collected</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon stat-icon--red"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div>
          <div class="stat-n" id="s-outstanding">—</div><div class="stat-l">Outstanding</div>
        </div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>Tenant</th><th>Unit</th><th>Amount Due</th><th>Due Date</th><th>Status</th><th>Paid Date</th><th>Actions</th></tr>
          </thead>
          <tbody id="rentTable">
            <tr class="loading-row"><td colspan="7">Loading…</td></tr>
          </tbody>
        </table>
      </div>

    </main>
  </div>
</div>

<!-- Log Payment Modal -->
<div class="modal-backdrop" id="payModal">
  <div class="modal" style="max-width:440px;">
    <div class="modal-header">
      <span class="modal-title" id="payModalTitle">Log Payment</span>
      <button class="modal-close" onclick="closeModal('payModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Amount Paid ($)</label>
          <input class="form-input" type="number" id="p-amount" placeholder="1500"/>
        </div>
        <div class="form-group">
          <label class="form-label">Date Paid</label>
          <input class="form-input" type="date" id="p-date"/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Status</label>
        <select class="form-select" id="p-status">
          <option value="paid">Paid in full</option>
          <option value="partial">Partial payment</option>
          <option value="late">Late</option>
        </select>
      </div>
      <div class="form-group"><label class="form-label">Note (optional)</label><input class="form-input" id="p-note" placeholder="e.g. Paid via Venmo"/></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('payModal')">Cancel</button>
      <button class="btn btn-primary" id="payBtn" onclick="savePayment()">Mark as Paid</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/layout.js"></script>
<script>
let currentUser = null
let viewDate = new Date()
let rentData = []
let editingPaymentId = null

async function init() {
  currentUser = await requireAuth()
  if (!currentUser) return
  await renderLayout('rent', 'Rent')
  renderMonthLabel()
  await loadRent()
}

function renderMonthLabel() {
  document.getElementById('monthLabel').textContent =
    viewDate.toLocaleDateString('en-US', { month: 'long', year: 'numeric' })
}

function changeMonth(dir) {
  viewDate = new Date(viewDate.getFullYear(), viewDate.getMonth() + dir, 1)
  renderMonthLabel()
  loadRent()
}

function monthRange() {
  const y = viewDate.getFullYear()
  const m = String(viewDate.getMonth() + 1).padStart(2, '0')
  const lastDay = new Date(y, viewDate.getMonth() + 1, 0).getDate()
  return { start: `${y}-${m}-01`, end: `${y}-${m}-${String(lastDay).padStart(2, '0')}` }
}

async function loadRent() {
  const { start, end } = monthRange()
  const { data } = await db
    .from('rent_payments')
    .select('*, tenants(name, units(unit_number))')
    .eq('pm_id', currentUser.id)
    .gte('due_date', start)
    .lte('due_date', end)
    .order('status')
  rentData = data || []
  renderSummary()
  renderTable()
}

function renderSummary() {
  const expected = rentData.reduce((s, r) => s + (r.amount || 0), 0)
  const collected = rentData.filter(r => r.status === 'paid' || r.status === 'partial').reduce((s, r) => s + (r.amount || 0), 0)
  document.getElementById('s-expected').textContent = fmt$(expected)
  document.getElementById('s-collected').textContent = fmt$(collected)
  document.getElementById('s-outstanding').textContent = fmt$(expected - collected)
}

function renderTable() {
  const tbody = document.getElementById('rentTable')
  if (rentData.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:40px;color:rgba(15,23,42,0.35);font-size:0.82rem;">No rent records for this month. Click "Generate Month" to create them.</td></tr>'
    return
  }
  tbody.innerHTML = rentData.map(r => `
    <tr>
      <td>
        <div class="name-cell">
          <div class="avatar" style="width:28px;height:28px;font-size:0.6rem;background:${avatarColor(r.tenants?.name)}">${initials(r.tenants?.name)}</div>
          <span class="fw-700">${r.tenants?.name || '—'}</span>
        </div>
      </td>
      <td class="td-muted">${r.tenants?.units?.unit_number || '—'}</td>
      <td class="fw-700">${fmt$(r.amount)}</td>
      <td class="td-muted">${fmtDate(r.due_date)}</td>
      <td>${statusBadge(r.status)}</td>
      <td class="td-muted">${r.paid_date ? fmtDate(r.paid_date) : '—'}</td>
      <td>
        <div style="display:flex;gap:6px;">
          ${r.status !== 'paid' ? `<button class="btn btn-success btn-sm" onclick="openPayModal('${r.id}','${r.tenants?.name}',${r.amount})">Mark Paid</button>` : ''}
          ${r.status !== 'late' && r.status !== 'paid' ? `<button class="btn btn-danger btn-sm" onclick="markLate('${r.id}')">Late</button>` : ''}
        </div>
      </td>
    </tr>`).join('')
}

function openPayModal(id, name, amount) {
  editingPaymentId = id
  document.getElementById('payModalTitle').textContent = `Log Payment — ${name}`
  document.getElementById('p-amount').value = amount
  document.getElementById('p-date').value = new Date().toISOString().split('T')[0]
  document.getElementById('p-status').value = 'paid'
  document.getElementById('p-note').value = ''
  openModal('payModal')
}

async function savePayment() {
  const btn = document.getElementById('payBtn')
  btnLoad(btn, true)
  const { error } = await db.from('rent_payments').update({
    amount: parseFloat(document.getElementById('p-amount').value),
    paid_date: document.getElementById('p-date').value,
    status: document.getElementById('p-status').value,
    note: document.getElementById('p-note').value || null,
  }).eq('id', editingPaymentId)
  btnLoad(btn, false)
  if (error) { toast(error.message, 'error'); return }
  toast('Payment logged')
  closeModal('payModal')
  await loadRent()
}

async function markLate(id) {
  await db.from('rent_payments').update({ status: 'late' }).eq('id', id)
  toast('Marked as late')
  await loadRent()
}

async function generateMonth() {
  const { start, end } = monthRange()
  const existing = rentData.map(r => r.tenant_id)

  const { data: activeTenants } = await db
    .from('tenants')
    .select('id, monthly_rent')
    .eq('pm_id', currentUser.id)
    .in('status', ['active','late','notice'])

  if (!activeTenants || activeTenants.length === 0) {
    toast('No active tenants found', 'error'); return
  }

  const toInsert = activeTenants
    .filter(t => !existing.includes(t.id))
    .map(t => ({
      pm_id: currentUser.id,
      tenant_id: t.id,
      amount: t.monthly_rent,
      due_date: start,
      status: 'pending',
    }))

  if (toInsert.length === 0) {
    toast('All tenants already have records for this month', 'info'); return
  }

  const { error } = await db.from('rent_payments').insert(toInsert)
  if (error) { toast(error.message, 'error'); return }
  toast(`Generated ${toInsert.length} payment records`)
  await loadRent()
}

function openModal(id) { document.getElementById(id).classList.add('open') }
function closeModal(id) { document.getElementById(id).classList.remove('open') }
document.querySelectorAll('.modal-backdrop').forEach(b => b.addEventListener('click', e => { if (e.target === b) b.classList.remove('open') }))

init()
</script>
</body>
</html>
