<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Maintenance — BMP Central</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/admin.css"/>
</head>
<body>
<div class="admin-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-wrap">
    <header class="topbar" id="topbar"></header>
    <main class="main-content">

      <div class="page-header">
        <div>
          <h2>Maintenance</h2>
          <div class="page-sub" id="maintCount">Loading…</div>
        </div>
        <button class="btn btn-primary" onclick="openModal('addModal')">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Log Request
        </button>
      </div>

      <div class="filter-bar">
        <div class="filter-search">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" placeholder="Search requests…" id="searchInput" oninput="renderTable()"/>
        </div>
        <div class="filter-tabs">
          <button class="filter-tab active" onclick="setFilter('all',this)">All</button>
          <button class="filter-tab" onclick="setFilter('open',this)">Open</button>
          <button class="filter-tab" onclick="setFilter('in_progress',this)">In Progress</button>
          <button class="filter-tab" onclick="setFilter('resolved',this)">Resolved</button>
        </div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>Issue</th><th>Tenant</th><th>Unit</th><th>Priority</th><th>Status</th><th>Opened</th><th></th></tr>
          </thead>
          <tbody id="maintTable">
            <tr class="loading-row"><td colspan="7">Loading…</td></tr>
          </tbody>
        </table>
      </div>

    </main>
  </div>
</div>

<!-- Add Modal -->
<div class="modal-backdrop" id="addModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Log Maintenance Request</span>
      <button class="modal-close" onclick="closeModal('addModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">Title *</label><input class="form-input" id="a-title" placeholder="e.g. AC not cooling"/></div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Tenant</label>
          <select class="form-select" id="a-tenant" onchange="unitFromTenant(this)"><option value="">Select tenant…</option></select>
        </div>
        <div class="form-group">
          <label class="form-label">Priority</label>
          <select class="form-select" id="a-priority">
            <option value="low">Low</option>
            <option value="medium" selected>Medium</option>
            <option value="high">High</option>
            <option value="urgent">Urgent</option>
          </select>
        </div>
      </div>
      <div class="form-group"><label class="form-label">Description</label><textarea class="form-textarea" id="a-desc" placeholder="Describe the issue…"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('addModal')">Cancel</button>
      <button class="btn btn-primary" id="addBtn" onclick="addRequest()">Log Request</button>
    </div>
  </div>
</div>

<!-- View Modal -->
<div class="modal-backdrop" id="viewModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="viewTitle">Request Details</span>
      <button class="modal-close" onclick="closeModal('viewModal')">✕</button>
    </div>
    <div class="modal-body" id="viewBody"></div>
    <div class="modal-footer">
      <button class="btn btn-danger btn-sm" onclick="deleteRequest()">Delete</button>
      <div style="flex:1"></div>
      <button class="btn btn-ghost" onclick="closeModal('viewModal')">Close</button>
      <button class="btn btn-primary" id="saveBtn" onclick="saveRequest()">Save</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/layout.js"></script>
<script>
let currentUser = null
let allRequests = []
let currentFilter = 'all'
let editingId = null
let tenants = []

async function init() {
  currentUser = await requireAuth()
  if (!currentUser) return
  await renderLayout('maintenance', 'Maintenance')
  await loadTenants()
  await loadRequests()
}

async function loadTenants() {
  const { data } = await db.from('tenants').select('id, name, unit_id, units(unit_number)').eq('pm_id', currentUser.id).order('name')
  tenants = data || []
  const sel = document.getElementById('a-tenant')
  sel.innerHTML = '<option value="">Select tenant…</option>' +
    tenants.map(t => `<option value="${t.id}" data-unit="${t.unit_id || ''}">${t.name}${t.units ? ` — ${t.units.unit_number}` : ''}</option>`).join('')
}

function unitFromTenant(sel) {
  const opt = sel.selectedOptions[0]
  // store unit_id for later
  sel.dataset.unitId = opt?.dataset.unit || ''
}

async function loadRequests() {
  const { data } = await db
    .from('maintenance_requests')
    .select('*, tenants(name), units(unit_number, properties(name))')
    .eq('pm_id', currentUser.id)
    .order('created_at', { ascending: false })
  allRequests = data || []
  const open = allRequests.filter(r => r.status === 'open' || r.status === 'in_progress').length
  document.getElementById('maintCount').textContent = `${open} open · ${allRequests.length} total`
  renderTable()
}

function setFilter(f, btn) {
  currentFilter = f
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'))
  btn.classList.add('active')
  renderTable()
}

function renderTable() {
  const q = document.getElementById('searchInput').value.toLowerCase()
  const rows = allRequests.filter(r => {
    if (currentFilter !== 'all' && r.status !== currentFilter) return false
    if (q && !r.title.toLowerCase().includes(q) && !r.tenants?.name.toLowerCase().includes(q)) return false
    return true
  })

  const tbody = document.getElementById('maintTable')
  if (rows.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:40px;color:rgba(15,23,42,0.35);font-size:0.82rem;">No requests found</td></tr>'
    return
  }
  tbody.innerHTML = rows.map(r => `
    <tr>
      <td>
        <div class="fw-700">${r.title}</div>
        ${r.description ? `<div class="td-muted truncate" style="max-width:220px;font-size:0.72rem;">${r.description}</div>` : ''}
      </td>
      <td>${r.tenants ? `<div class="name-cell"><div class="avatar" style="width:26px;height:26px;font-size:0.58rem;background:${avatarColor(r.tenants.name)}">${initials(r.tenants.name)}</div>${r.tenants.name}</div>` : '<span class="td-muted">—</span>'}</td>
      <td class="td-muted">${r.units ? `${r.units.properties?.name || ''} ${r.units.unit_number}` : '—'}</td>
      <td>${statusBadge(r.priority)}</td>
      <td>
        <select class="form-select" style="height:32px;font-size:0.75rem;padding:0 8px;border-radius:7px;" onchange="quickStatus('${r.id}',this.value)">
          ${['open','in_progress','resolved'].map(s => `<option value="${s}" ${r.status===s?'selected':''}>${s==='in_progress'?'In Progress':s.charAt(0).toUpperCase()+s.slice(1)}</option>`).join('')}
        </select>
      </td>
      <td class="td-muted">${timeAgo(r.created_at)}</td>
      <td><button class="btn btn-ghost btn-sm" onclick="openView('${r.id}')">View</button></td>
    </tr>`).join('')
}

async function quickStatus(id, status) {
  const { error } = await db.from('maintenance_requests').update({ status, updated_at: new Date().toISOString() }).eq('id', id)
  if (error) { toast(error.message, 'error'); return }
  const r = allRequests.find(x => x.id === id)
  if (r) r.status = status
  toast('Status updated')
}

async function addRequest() {
  const title = document.getElementById('a-title').value.trim()
  if (!title) { toast('Title is required', 'error'); return }
  const btn = document.getElementById('addBtn')
  btnLoad(btn, true)
  const tenantSel = document.getElementById('a-tenant')
  const tenantId = tenantSel.value || null
  const unitId = tenantSel.dataset.unitId || null
  const { error } = await db.from('maintenance_requests').insert({
    pm_id: currentUser.id,
    tenant_id: tenantId,
    unit_id: unitId,
    title,
    description: document.getElementById('a-desc').value || null,
    priority: document.getElementById('a-priority').value,
    status: 'open',
  })
  btnLoad(btn, false)
  if (error) { toast(error.message, 'error'); return }
  toast('Request logged')
  closeModal('addModal')
  document.getElementById('addModal').querySelectorAll('input,select,textarea').forEach(el => el.value = el.tagName === 'SELECT' ? el.options[0]?.value : '')
  await loadRequests()
}

function openView(id) {
  const r = allRequests.find(x => x.id === id)
  if (!r) return
  editingId = id
  document.getElementById('viewTitle').textContent = r.title
  document.getElementById('viewBody').innerHTML = `
    <div class="form-group"><label class="form-label">Title</label><input class="form-input" id="v-title" value="${r.title}"/></div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Priority</label>
        <select class="form-select" id="v-priority">
          ${['low','medium','high','urgent'].map(s => `<option value="${s}" ${r.priority===s?'selected':''}>${s.charAt(0).toUpperCase()+s.slice(1)}</option>`).join('')}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Status</label>
        <select class="form-select" id="v-status">
          ${['open','in_progress','resolved'].map(s => `<option value="${s}" ${r.status===s?'selected':''}>${s==='in_progress'?'In Progress':s.charAt(0).toUpperCase()+s.slice(1)}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="form-group"><label class="form-label">Description</label><textarea class="form-textarea" id="v-desc">${r.description || ''}</textarea></div>
    <div style="margin-top:8px;" class="flex gap-2">
      <span class="tag">Opened ${fmtDate(r.created_at)}</span>
      ${r.tenants ? `<span class="tag">Tenant: ${r.tenants.name}</span>` : ''}
      ${r.units ? `<span class="tag">Unit: ${r.units.unit_number}</span>` : ''}
    </div>
  `
  openModal('viewModal')
}

async function saveRequest() {
  const btn = document.getElementById('saveBtn')
  btnLoad(btn, true)
  const { error } = await db.from('maintenance_requests').update({
    title: document.getElementById('v-title').value,
    priority: document.getElementById('v-priority').value,
    status: document.getElementById('v-status').value,
    description: document.getElementById('v-desc').value || null,
    updated_at: new Date().toISOString(),
  }).eq('id', editingId)
  btnLoad(btn, false)
  if (error) { toast(error.message, 'error'); return }
  toast('Saved')
  closeModal('viewModal')
  await loadRequests()
}

async function deleteRequest() {
  if (!confirm('Delete this request?')) return
  await db.from('maintenance_requests').delete().eq('id', editingId)
  toast('Deleted')
  closeModal('viewModal')
  await loadRequests()
}

function openModal(id) { document.getElementById(id).classList.add('open') }
function closeModal(id) { document.getElementById(id).classList.remove('open') }
document.querySelectorAll('.modal-backdrop').forEach(b => b.addEventListener('click', e => { if (e.target === b) b.classList.remove('open') }))

init()
</script>
</body>
</html>
